<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRX Candle Chart - Pro Engine</title>
    <script src="lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0e11;
            --bg-panel: #181a20;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --color-up: #0ecb81;
            --color-down: #f6465d;
            --border-color: #2b3139;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto Mono', monospace; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background-color: var(--bg-panel); border-bottom: 1px solid var(--border-color); height: 60px; flex-shrink: 0;}
        .header-left { display: flex; align-items: center; gap: 10px; }
        .title { font-size: 16px; font-weight: 700; color: #fCD535;}
        .header-center { display: flex; gap: 10px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid;}
        
        /* Main Layout */
        .main-container { display: flex; flex: 1; flex-direction: row; overflow: hidden; }
        
        /* Left Panel */
        .left-panel { width: 250px; padding: 15px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid var(--border-color); background: var(--bg-main); overflow-y: auto; flex-shrink: 0;}
        .timer-box { text-align: center; background: var(--bg-panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);}
        .timer-box .label { font-size: 11px; color: var(--text-muted); }
        .timer-box .value { font-size: 16px; font-weight: bold; margin-top: 5px; color: #fff; }
        .timer-box .countdown { font-size: 26px; font-weight: bold; color: var(--color-up); margin-top: 5px; }
        
        .info-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; }
        .info-card h4 { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;}
        .ta-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; }
        .ta-row span:first-child { color: var(--text-muted); }
        
        .up-text { color: var(--color-up) !important; }
        .down-text { color: var(--color-down) !important; }
        .neutral-text { color: var(--text-muted) !important; }

        /* Chart Area */
        .chart-container { flex: 1; position: relative; min-width: 0; min-height: 300px; }
        #tvChart { position: absolute; width: 100%; height: 100%; }

        /* Right Panel */
        .right-panel { width: 300px; background: var(--bg-panel); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0;}
        .stats-section { padding: 15px; border-bottom: 1px solid var(--border-color); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; }
        .stat-box { background: var(--bg-main); padding: 10px 5px; border-radius: 6px; border: 1px solid var(--border-color); }
        .stat-box .val { font-size: 14px; font-weight: bold; margin-bottom: 3px; }
        .stat-box .lbl { font-size: 9px; color: var(--text-muted); }

        .history-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .history-section h3 { font-size: 12px; color: var(--text-muted); padding: 15px 15px 5px; }
        .table-header { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr; padding: 10px 15px; font-size: 10px; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }
        .history-list { flex: 1; overflow-y: auto; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border-color); }
        .history-row { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr; padding: 10px 15px; font-size: 11px; border-bottom: 1px solid var(--border-color); align-items: center; }

        /* Mobile Responsive Layout (Stack vertically on phones) */
        @media (max-width: 800px) {
            body { overflow-y: auto; }
            .main-container { flex-direction: column; height: auto; overflow: visible; }
            .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); flex-direction: row; flex-wrap: wrap; justify-content: space-between; }
            .left-panel > * { flex: 1; min-width: 45%; }
            .chart-container { height: 400px; flex: none; }
            .right-panel { width: 100%; border-left: none; border-top: 1px solid var(--border-color); }
            .history-section { min-height: 400px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="title">GUARDIAN TRX PRO</div>
        </div>
        <div class="header-center">
            <div class="badge" id="topConf" style="border-color: #fCD535; color: #fCD535;">CONF: 0%</div>
            <div class="badge" id="topSignal" style="border-color: var(--text-muted); color: var(--text-muted);">AI: WAITING</div>
        </div>
    </header>

    <div class="main-container">
        <aside class="left-panel">
            <div class="timer-box">
                <div class="label">NEXT PERIOD</div>
                <div class="value" id="nextPeriod">---</div>
                <div class="label" style="margin-top:10px;">COUNTDOWN</div>
                <div class="countdown" id="countdownTimer">00:00</div>
            </div>

            <div class="info-card">
                <h4>≡ TA SIGNALS</h4>
                <div class="ta-row">
                    <span>S/R Logic</span>
                    <strong id="taSR">-</strong>
                </div>
                <div class="ta-row">
                    <span>Trend Break</span>
                    <strong id="taTB">-</strong>
                </div>
                <div class="ta-row">
                    <span>Flag Pattern</span>
                    <strong id="taFlag">-</strong>
                </div>
            </div>

            <div class="info-card">
                <h4>≡ LATEST RESULT</h4>
                <div class="ta-row">
                    <span>Digit</span>
                    <strong id="cDigit">-</strong>
                </div>
                <div class="ta-row">
                    <span>Result</span>
                    <strong id="cResult">-</strong>
                </div>
            </div>
        </aside>

        <main class="chart-container">
            <div id="tvChart"></div>
        </main>

        <aside class="right-panel">
            <div class="stats-section">
                <div class="stats-grid">
                    <div class="stat-box"><div class="val up-text" id="stWins">0</div><div class="lbl">WINS</div></div>
                    <div class="stat-box"><div class="val down-text" id="stLosses">0</div><div class="lbl">LOSSES</div></div>
                    <div class="stat-box"><div class="val" id="stRate">0%</div><div class="lbl">WIN RATE</div></div>
                    <div class="stat-box"><div class="val" id="stTotal">0</div><div class="lbl">TOTAL</div></div>
                    <div class="stat-box"><div class="val up-text" id="stBest">0</div><div class="lbl">MAX WIN</div></div>
                    <div class="stat-box"><div class="val down-text" id="stWorst">0</div><div class="lbl">MAX LOSS</div></div>
                </div>
            </div>

            <div class="history-section">
                <h3>↺ LIVE PREDICTIONS</h3>
                <div class="table-header">
                    <div>PERIOD</div>
                    <div>PREDICT</div>
                    <div>ACTUAL</div>
                    <div>W/L</div>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </aside>
    </div>

<script>
    // --- GLOBAL STATE ---
    const state = {
        history: {},
        total_wins: 0,
        total_losses: 0,
        current_win_streak: 0,
        current_loss_streak: 0,
        max_win_streak: 0,
        max_loss_streak: 0,
        predictions_memory: {},
        processed_periods: new Set(),
        current_prediction: { period: null, side: null, conf: 0, note: "Analyzing..." }
    };

    // Use CORS Proxy to bypass GitHub Pages / Browser restrictions
    const API_URL = "https://draw.ar-lottery01.com/TrxWinGo/TrxWinGo_1M/GetHistoryIssuePage.json";
    const CORS_PROXY = "https://api.allorigins.win/raw?url=";
    
    let chart, candleSeries;
    let processedCandles = [];

    // --- CHART INIT ---
    function initChart() {
        const wrap = document.getElementById('tvChart');
        chart = LightweightCharts.createChart(wrap, {
            layout: { background: { color: '#0b0e11' }, textColor: '#848e9c' },
            grid: { vertLines: { color: '#1f2933' }, horzLines: { color: '#1f2933' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2b3139' },
            timeScale: { borderColor: '#2b3139', timeVisible: false, rightOffset: 12 } // Hide default time labels
        });
        candleSeries = chart.addCandlestickSeries({
            upColor: '#0ecb81', downColor: '#f6465d',
            borderUpColor: '#0ecb81', borderDownColor: '#f6465d',
            wickUpColor: '#0ecb81', wickDownColor: '#f6465d'
        });
        new ResizeObserver(() => chart.resize(wrap.clientWidth, wrap.clientHeight)).observe(wrap);
    }

    // --- 1. CANDLE BUILDER ---
    function buildCandles(dataList) {
        const sorted = dataList.slice().sort((a, b) => parseInt(a.issueNumber) - parseInt(b.issueNumber));
        let price = 10000.0;
        return sorted.map((item, idx) => {
            const isBig = parseInt(item.number) >= 5;
            const body = isBig ? 0.02 : -0.02;
            const open = price;
            const close = price + body;
            const wick = Math.abs(body) * 0.2;
            price = close;
            return {
                time: idx, // Using simple index for time
                open: open,
                close: close,
                high: Math.max(open, close) + wick,
                low: Math.min(open, close) - wick,
                issue: item.issueNumber
            };
        });
    }

    // --- 2. TA METHODS ---
    function findSRLevels(candles, lookback) {
        const levels = [];
        for (let i = lookback; i < candles.length - lookback; i++) {
            const c = candles[i];
            let isSwingH = true, isSwingL = true;
            for (let j = 1; j <= lookback; j++) {
                if (candles[i-j].high >= c.high || candles[i+j].high >= c.high) isSwingH = false;
                if (candles[i-j].low <= c.low || candles[i+j].low <= c.low) isSwingL = false;
            }
            if (isSwingH) levels.push({ price: c.high, type: 'R' });
            if (isSwingL) levels.push({ price: c.low, type: 'S' });
        }
        return levels;
    }

    function srSignal(candles) {
        if (candles.length < 20) return { vote: 0, note: '' };
        const levels = findSRLevels(candles.slice(-60), 3);
        const last = candles[candles.length - 1];
        const price = last.close;
        const range = Math.abs(last.high - last.low) * 3;

        let nearR = levels.filter(l => l.type === 'R' && Math.abs(l.price - price) < range);
        let nearS = levels.filter(l => l.type === 'S' && Math.abs(l.price - price) < range);
        let brokeR = levels.filter(l => l.type === 'R' && last.open < l.price && last.close > l.price);
        let brokeS = levels.filter(l => l.type === 'S' && last.open > l.price && last.close < l.price);

        if (brokeR.length) return { vote: +2, note: 'R Breakout ↑' };
        if (brokeS.length) return { vote: -2, note: 'S Breakdown ↓' };
        if (nearR.length) return { vote: -1, note: 'Near Resistance' };
        if (nearS.length) return { vote: +1, note: 'Near Support' };
        return { vote: 0, note: '' };
    }

    function trendBreakoutSignal(candles) {
        if (candles.length < 15) return { vote: 0, note: '' };
        const n = 15;
        const seg = candles.slice(-n);
        let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
        seg.forEach((c, i) => { sumX += i; sumY += c.close; sumXY += i * c.close; sumX2 += i * i; });
        const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);

        const last3 = candles.slice(-3);
        const bullMomentum = last3.every(c => c.close > c.open);
        const bearMomentum = last3.every(c => c.close < c.open);
        const last = candles[candles.length - 1];
        const candleIsBull = last.close > last.open;
        const candleIsBear = last.close < last.open;

        if (slope < 0 && candleIsBull && bullMomentum) return { vote: +2, note: 'Downtrend Break ↑' };
        if (slope > 0 && candleIsBear && bearMomentum) return { vote: -2, note: 'Uptrend Break ↓' };
        if (slope > 0 && candleIsBull) return { vote: +1, note: 'Uptrend Cont.' };
        if (slope < 0 && candleIsBear) return { vote: -1, note: 'Downtrend Cont.' };
        return { vote: 0, note: '' };
    }

    function flagPatternSignal(candles) {
        if (candles.length < 12) return { vote: 0, note: '' };
        const pole = candles.slice(-12, -5);
        const flag = candles.slice(-5);
        const poleBull = pole.filter(c => c.close > c.open).length;
        const poleBear = pole.filter(c => c.close < c.open).length;
        const poleIsBull = poleBull > poleBear;
        const poleIsBear = poleBear > poleBull;

        const flagBull = flag.filter(c => c.close > c.open).length;
        const flagBear = flag.filter(c => c.close < c.open).length;
        const flagCounter = poleIsBull ? flagBear >= 2 : flagBull >= 2;
        const last = candles[candles.length - 1];

        if (poleIsBull && flagCounter && last.close > last.open) return { vote: +2, note: 'Bull Flag ↑' };
        if (poleIsBear && flagCounter && last.close < last.open) return { vote: -2, note: 'Bear Flag ↓' };
        if (poleIsBull && flagCounter) return { vote: +1, note: 'Bull Flag Form' };
        if (poleIsBear && flagCounter) return { vote: -1, note: 'Bear Flag Form' };
        return { vote: 0, note: '' };
    }

    function executeProPrediction(candles) {
        if (candles.length < 15) return null;
        
        const sr = srSignal(candles);
        const tb = trendBreakoutSignal(candles);
        const flag = flagPatternSignal(candles);

        function formatTA(v, n) {
            if(v === 0) return `<span class="neutral-text">Neutral</span>`;
            return `<span class="${v > 0 ? 'up-text' : 'down-text'}">${n || 'Active'}</span>`;
        }
        document.getElementById('taSR').innerHTML = formatTA(sr.vote, sr.note);
        document.getElementById('taTB').innerHTML = formatTA(tb.vote, tb.note);
        document.getElementById('taFlag').innerHTML = formatTA(flag.vote, flag.note);

        const totalVote = (sr.vote * 3) + (tb.vote * 3) + (flag.vote * 4);
        const maxVote = (2 * 3) + (2 * 3) + (2 * 4);
        
        let side = "WAIT";
        if (totalVote > 0) side = "BIG";
        else if (totalVote < 0) side = "SMALL";

        const conf = Math.min(Math.floor(50 + (Math.abs(totalVote) / maxVote) * 45), 95);
        return { side, conf };
    }

    // --- MAIN API LOOP ---
    async function mainLoop() {
        try {
            // Using CORS proxy to fetch safely on frontend
            const targetUrl = `${API_URL}?pageSize=50&pageNo=1&ts=${Date.now()}`;
            const res = await fetch(CORS_PROXY + encodeURIComponent(targetUrl));
            const json = await res.json();
            const dataList = json.data.list;

            dataList.forEach(i => state.history[i.issueNumber] = i);
            const sortedKeys = Object.keys(state.history).sort((a,b) => parseInt(b) - parseInt(a));
            const latest_p = sortedKeys[0];
            const next_p = (BigInt(latest_p) + 1n).toString();

            document.getElementById('nextPeriod').textContent = next_p;
            
            // Build Candles
            processedCandles = buildCandles(Object.values(state.history));
            candleSeries.setData(processedCandles);

            // Set visible range to end
            chart.timeScale().fitContent();

            // Latest Result UI
            const latestData = state.history[latest_p];
            const num = parseInt(latestData.number);
            const isBig = num >= 5;
            document.getElementById('cDigit').textContent = num;
            document.getElementById('cResult').textContent = isBig ? "BIG" : "SMALL";
            document.getElementById('cResult').className = isBig ? "up-text" : "down-text";

            // Win/Loss Calculation
            sortedKeys.forEach(p => {
                if(state.predictions_memory[p] && !state.processed_periods.has(p)) {
                    const actualSide = parseInt(state.history[p].number) >= 5 ? "BIG" : "SMALL";
                    if(state.predictions_memory[p] === actualSide) {
                        state.total_wins++;
                        state.current_win_streak++;
                        state.current_loss_streak = 0;
                        if(state.current_win_streak > state.max_win_streak) state.max_win_streak = state.current_win_streak;
                    } else {
                        state.total_losses++;
                        state.current_loss_streak++;
                        state.current_win_streak = 0;
                        if(state.current_loss_streak > state.max_loss_streak) state.max_loss_streak = state.current_loss_streak;
                    }
                    state.processed_periods.add(p);
                }
            });

            // Make Prediction
            if (state.current_prediction.period !== next_p) {
                const pred = executeProPrediction(processedCandles);
                if(pred && pred.side !== "WAIT") {
                    state.current_prediction = { period: next_p, ...pred };
                    state.predictions_memory[next_p] = pred.side;
                    
                    const sigEl = document.getElementById('topSignal');
                    sigEl.textContent = `AI SIGNAL: ${pred.side}`;
                    sigEl.style.borderColor = pred.side === 'BIG' ? 'var(--color-up)' : 'var(--color-down)';
                    sigEl.style.color = pred.side === 'BIG' ? 'var(--color-up)' : 'var(--color-down)';
                    
                    document.getElementById('topConf').textContent = `CONF: ${pred.conf}%`;
                }
            }

            updateDashboard();

        } catch(e) {
            console.error("API Fetch Error:", e);
            document.getElementById('topSignal').textContent = "CONNECTION ERROR";
        }
    }

    function updateDashboard() {
        const total = state.total_wins + state.total_losses;
        const rate = total > 0 ? ((state.total_wins / total) * 100).toFixed(1) : 0;
        
        document.getElementById('stWins').textContent = state.total_wins;
        document.getElementById('stLosses').textContent = state.total_losses;
        document.getElementById('stRate').textContent = rate + '%';
        document.getElementById('stTotal').textContent = total;
        document.getElementById('stBest').textContent = state.max_win_streak;
        document.getElementById('stWorst').textContent = state.max_loss_streak;

        const listEl = document.getElementById('historyList');
        listEl.innerHTML = '';
        
        const sortedHist = Object.values(state.history).sort((a,b) => parseInt(b.issueNumber) - parseInt(a.issueNumber));
        
        sortedHist.slice(0, 30).forEach(item => {
            const p = item.issueNumber;
            const actualSide = parseInt(item.number) >= 5 ? "BIG" : "SMALL";
            const actualClass = actualSide === "BIG" ? "up-text" : "down-text";
            
            let pred = "-";
            let statusIcon = "⏳";
            
            if(state.predictions_memory[p]) {
                pred = state.predictions_memory[p];
                statusIcon = (pred === actualSide) ? "✅" : "❌";
            }

            const predClass = pred === "BIG" ? "up-text" : (pred === "SMALL" ? "down-text" : "neutral-text");

            const row = document.createElement('div');
            row.className = 'history-row';
            row.innerHTML = `
                <div>${p.slice(0,3)}**${p.slice(-4)}</div>
                <div class="${predClass}">${pred}</div>
                <div class="${actualClass}">${actualSide}</div>
                <div>${statusIcon}</div>
            `;
            listEl.appendChild(row);
        });
    }

    // --- CLOCK ---
    setInterval(() => {
        const now = new Date();
        const seconds = now.getSeconds();
        const remaining = 60 - seconds;
        document.getElementById('countdownTimer').textContent = `00:${remaining.toString().padStart(2, '0')}`;
    }, 1000);

    // Bootstrap
    initChart();
    mainLoop();
    setInterval(mainLoop, 5000); 
</script>
</body>
</html>
